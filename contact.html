<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | サービス管理ポータル</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <!-- サイドバー -->
    <aside class="sidebar">
      <div class="logo">サービス管理ポータル</div>
      <nav>
        <a href="dashboard.html">ダッシュボード</a>
        <a href="services.html">契約サービス一覧</a>
        <a href="apply.html">新規申し込み</a>
        <a href="coupon.html">クーポン購入</a>
        <a href="contact.html" class="active">お問い合わせ</a>
      </nav>
      <div class="user-info"></div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main">
      <div class="page-header">
        <h2>お問い合わせ</h2>
        <div class="breadcrumb">ホーム &gt; お問い合わせ</div>
      </div>

      <!-- お問い合わせフォーム -->
      <div class="card" id="contactFormView">
        <h3>お問い合わせフォーム</h3>
        <form id="contactForm" onsubmit="submitContact(event)">
          <div class="form-group">
            <label for="contactCategory">カテゴリ</label>
            <select id="contactCategory" required>
              <option value="">選択してください</option>
              <option value="billing">料金・請求について</option>
              <option value="technical">技術的なお問い合わせ</option>
              <option value="contract">契約・解約について</option>
              <option value="other">その他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="contactService">関連サービス（任意）</label>
            <select id="contactService">
              <option value="">なし</option>
            </select>
          </div>
          <div class="form-group">
            <label for="contactSubject">件名</label>
            <input type="text" id="contactSubject" placeholder="お問い合わせの件名を入力" required>
            <span class="error-msg">件名を入力してください</span>
          </div>
          <div class="form-group">
            <label for="contactBody">お問い合わせ内容</label>
            <textarea id="contactBody" rows="6" placeholder="お問い合わせ内容を詳しくご記入ください" required></textarea>
            <span class="error-msg">お問い合わせ内容を入力してください</span>
          </div>
          <button type="submit" class="btn btn-primary">送信する</button>
        </form>
      </div>

      <!-- 送信完了 -->
      <div class="card" id="contactCompleteView" style="display:none; text-align:center; padding:40px;">
        <div style="font-size:48px; color:#22c55e; margin-bottom:16px;">✔</div>
        <h3>お問い合わせを受け付けました</h3>
        <p style="color:#666; margin:16px 0;">受付番号: <strong id="ticketNumber"></strong></p>
        <p style="color:#666;">担当者より2営業日以内にご連絡いたします。</p>
        <a href="contact.html" class="btn btn-outline" style="margin-top:24px;">新しいお問い合わせ</a>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>initContact();</script>
</body>
</html>
