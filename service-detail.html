<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サービス詳細 | サービス管理ポータル</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">サービス管理ポータル</div>
      <nav>
        <a href="dashboard.html">ダッシュボード</a>
        <a href="services.html" class="active">契約サービス一覧</a>
        <a href="apply.html">新規申し込み</a>
        <a href="coupon.html">クーポン購入</a>
        <a href="contact.html">お問い合わせ</a>
      </nav>
      <div class="user-info"></div>
    </aside>

    <main class="main">
      <div class="page-header">
        <h2 id="serviceName">-</h2>
        <div class="breadcrumb">ホーム &gt; <a href="services.html">契約サービス一覧</a> &gt; サービス詳細</div>
      </div>

      <!-- 契約情報 -->
      <div class="card">
        <h3>契約情報</h3>
        <dl class="detail-grid">
          <dt>サービスID</dt>
          <dd id="detailId">-</dd>
          <dt>サービス名</dt>
          <dd id="detailName">-</dd>
          <dt>カテゴリ</dt>
          <dd id="detailCategory">-</dd>
          <dt>ステータス</dt>
          <dd id="detailStatus">-</dd>
          <dt>プラン</dt>
          <dd id="detailPlan">-</dd>
          <dt>月額料金</dt>
          <dd id="detailFee">-</dd>
          <dt>契約日</dt>
          <dd id="detailDate">-</dd>
          <dt>オプション</dt>
          <dd id="detailOptions">-</dd>
        </dl>
      </div>

      <!-- 操作ボタン -->
      <div style="display:flex; gap:12px; margin-top:8px;">
        <a href="services.html" class="btn btn-outline">← 一覧に戻る</a>
        <button class="btn btn-danger" id="cancelBtn" onclick="showCancelModal()">このサービスを解約する</button>
      </div>

      <!-- 解約確認モーダル -->
      <div class="modal-overlay" id="cancelModal">
        <div class="modal">
          <h3>解約確認</h3>
          <p>このサービスを解約してよろしいですか？</p>
          <p style="color:var(--danger); font-size:13px; margin-top:8px;">※ 解約すると月末で利用が停止されます。再契約には新規申し込みが必要です。</p>
          <div class="btn-row">
            <button class="btn btn-outline" onclick="closeCancelModal()">キャンセル</button>
            <button class="btn btn-danger" onclick="confirmCancel()">解約する</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>initServiceDetail();</script>
</body>
</html>
