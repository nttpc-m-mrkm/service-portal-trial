<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード | サービス管理ポータル</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <!-- サイドバー -->
    <aside class="sidebar">
      <div class="logo">サービス管理ポータル</div>
      <nav>
        <a href="dashboard.html" class="active">ダッシュボード</a>
        <a href="services.html">契約サービス一覧</a>
        <a href="apply.html">新規申し込み</a>
        <a href="coupon.html">クーポン購入</a>
        <a href="contact.html">お問い合わせ</a>
      </nav>
      <div class="user-info"></div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main">
      <div class="page-header">
        <h2>ダッシュボード</h2>
        <div class="breadcrumb">ホーム</div>
        <p class="last-login" id="lastLogin" style="color: #888; font-size: 0.85rem; margin-top: 4px;">最終ログイン: -</p>
      </div>

      <!-- サマリーカード -->
      <div class="summary-grid">
        <div class="summary-card">
          <div class="number" id="activeCount">-</div>
          <div class="label">利用中サービス</div>
        </div>
        <div class="summary-card">
          <div class="number" id="totalFee">-</div>
          <div class="label">月額合計</div>
        </div>
        <div class="summary-card">
          <div class="number" id="couponBalance">-</div>
          <div class="label">クーポン残高</div>
        </div>
        <div class="summary-card">
          <div class="number" id="pendingCount">-</div>
          <div class="label">申請中</div>
        </div>
        <div class="summary-card">
          <div class="number" id="unreadNoticeCount">-</div>
          <div class="label">未読お知らせ</div>
        </div>
      </div>

      <!-- お知らせ -->
      <div class="card">
        <h3>お知らせ</h3>
        <ul class="notice-list" id="noticeList"></ul>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>initDashboard();</script>
</body>
</html>
